<!DOCTYPE html>
<html>
<head>
  <title>Image Slider</title>
  <style>
    body {
      font-family: Arial;
      width: 400px;
      padding: 10px;
      text-align: center;
    }

    input, button {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    .slider {
      position: relative;
      width: 100%;
      height: 250px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .slider img {
      width: 100%;
      height: 100%;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .controls button {
      width: 48%;
    }

    .choose-btn {
      margin-top: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
    }

    .slider {
        position: relative;
        width: 100%;
        height: 250px;
        }

        #preview {
        width: 100%;
        height: 100%;
        object-fit: contain;
        }

        #cropCanvas {
        position: absolute;
        top: 0;
        left: 0;
        cursor: crosshair;
        }

  </style>
</head>
<body>

  <input id="url" placeholder="Enter URL..." />
  <button id="load">Load Images</button>

  <div class="slider">
    <img id="preview" />
    <canvas id="cropCanvas"></canvas>
    </div>

  <p id="counter"></p>

  
<div class="controls">
  <button id="prev">Prev</button>
  <button id="next">Next</button>
</div>

    <button id="crop">Crop & Download</button>

  <!-- <button class="choose-btn" id="choose">Choose & Download</button> -->

  <script src="popup.js"></script>
</body>
</html>
