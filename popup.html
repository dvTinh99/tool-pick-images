<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Image Slider</title>
  <style>
    body {
      font-family: Arial;
      width: 400px;
      padding: 10px;
      text-align: center;
    }

    input,
    button {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .controls button {
      width: 48%;
    }

    #preview {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #cropCanvas {
      position: absolute;
      top: 0;
      left: 0;
      cursor: crosshair;
    }

    .viewer {
      width: 500px;
      height: 300px;
      overflow: auto;
      border: 1px solid #ccc;
    }

    .stage {
      position: relative;
      transform-origin: top left;
    }

    #preview {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }

    #cropCanvas {
      position: absolute;
      top: 0;
      left: 0;
      cursor: crosshair;
    }
  </style>
</head>

<body>
  <button id="clear">Clear Data</button>
  <input id="url" placeholder="Enter URL..." />
  <button id="load">Load Images</button>
  <p id="counter"></p>

  <div class="viewer">
    <div class="stage" id="stage">
      <img id="preview" alt="Preview" />
      <canvas id="cropCanvas"></canvas>
    </div>
  </div>

  <div class="controls">
    <button id="zoomIn">Zoom +</button>
    <button id="zoomOut">Zoom -</button>
    <button id="prev">Prev</button>
    <button id="next">Next</button>
    <button id="crop">Crop</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
